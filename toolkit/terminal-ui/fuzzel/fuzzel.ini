[main]
font=Fira Mono:size=22
dpi-aware=no
anchor=bottom
width=50
prompt=">"
line-height=28

# Slight vertical padding between entries
inner-pad=6
line-spacing=2

# Slight rounded corners if supported
border-radius=4
border-width=2

# Use 24-bit colors for a terminal-like dark theme
[colors]
# Near-black background with slight alpha for overlay usage
background=#050505f0

# Bright, readable text (ncurses “default foreground” style)
text=#f0f0f0

# Selected entry: green bar on dark background (classic TUI “active line”)
selection=#003322ff

# Border: subtle cyan/blue, enough to frame without distraction
border=#0088ccff

# Matched characters: yellow, like search highlights in ncurses/vim
match=#ffd75f

# Matched characters in selection: inverted yellow-on-green
selection-match=#ffffd7

# Optional: dim separator color (if your build supports it)
separator=#303030ff

