# foot configuration file - Universal ncurses theme
# Location: ~/.config/foot/foot.ini
#
# Classic ncurses green-on-black aesthetic with grey user input
# Compatible with tmux, nvim, vimb, and other ncurses applications

[main]
font=monospace:size=10
font-bold=monospace:weight=bold:size=10
font-italic=monospace:slant=italic:size=10
font-bold-italic=monospace:weight=bold:slant=italic:size=10

term=foot
shell=/bin/zsh
login-shell=no

initial-window-size-chars=100x30
initial-window-mode=windowed
title=foot - ncurses

pad=8x8

box-drawings-uses-font-glyphs=no
dpi-aware=no
gamma-correct-blending=no
bold-text-in-bright=yes

[scrollback]
lines=10000
multiplier=3
indicator-position=relative

[bell]
system=no
visual=no
urgent=no
notify=no

[colors]
# Universal ncurses color scheme
# Green output for data/system messages
# Grey text for user input
# Black background

# Foreground (user input in grey)
foreground=AAAAAA
background=000000

# Cursor colors: format is "text_color background_color"
# Grey Cursor 
cursor=FFFFFF 333333

# Standard ANSI 16-color palette
# These colors are used by tmux, vim, and other ncurses applications

# Regular colors (indexed 0-7)
regular0=000000
regular1=AA0000
regular2=00AA00
regular3=AA5500
regular4=0000AA
regular5=AA00AA
regular6=00AAAA
regular7=AAAAAA

# Bright colors (indexed 8-15)
# Bright green (2) is 55FF55 for vibrant output display
bright0=555555
bright1=FF5555
bright2=55FF55
bright3=FFFF55
bright4=5555FF
bright5=FF55FF
bright6=55FFFF
bright7=FFFFFF

# Optional dim colors for 16-color mode support
dim0=000000
dim1=550000
dim2=005500
dim3=555500
dim4=000055
dim5=550055
dim6=005555
dim7=555555

# Color transparency
alpha=1.0
alpha-mode=default

# Selection colors
selection-foreground=000000
selection-background=00FF00

# UI elements
jump-labels=555555 AAAAAA
scrollback-indicator=555555 5555FF
search-box-no-match=000000 AA0000
search-box-match=000000 AA5500
urls=00AA00
flash=7f7f00
flash-alpha=0.5

[cursor]
style=block
blink=yes
blink-rate=300
unfocused-style=hollow

[mouse]
hide-when-typing=yes
alternate-scroll-mode=yes

[touch]
long-press-delay=400

[key-bindings]
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v
font-increase=Control+plus 
font-decrease=Control+minus
font-reset=Control+0
search-start=Control+Shift+r
scrollback-up-page=Shift+Page_Up
scrollback-down-page=Shift+Page_Down
show-urls-launch=Control+Shift+o

[search-bindings]
cancel=Escape Control+c
commit=Return
find-next=Control+s
find-prev=Control+r

[url]
launch=xdg-open ${url}
osc8-underline=url-mode

[csd]
preferred=server
hide-when-maximized=no
