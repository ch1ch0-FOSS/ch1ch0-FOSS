# ============================================================================
# TMUX UNIFIED CONFIG - VI-LIKE KEYBOARD ONLY
# Fedora Asahi | ncurses green theme | sway/foot/nvim sync
# ============================================================================

# --- CORE SETTINGS ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -g focus-events on
setw -g aggressive-resize on
set -sg escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- VI MODE ---
set -g status-keys vi
setw -g mode-keys vi

# --- PREFIX KEY (Ctrl+a - screen-style) ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- RELOAD CONFIG ---
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# --- PANE NAVIGATION (VI-STYLE hjkl) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- PANE SPLITTING (INTUITIVE) ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# --- PANE RESIZING (VI-STYLE HJKL) ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- WINDOW NAVIGATION ---
bind -r C-h previous-window
bind -r C-l next-window
bind Tab last-window

# --- WINDOW CREATION ---
bind c new-window -c "#{pane_current_path}"

# --- COPY MODE (VI-STYLE) ---
bind Escape copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind p paste-buffer

# --- COPY MODE NAVIGATION (VI HJKL + PANE SWITCHING) ---
bind -T copy-mode-vi h send -X cursor-left
bind -T copy-mode-vi j send -X cursor-down
bind -T copy-mode-vi k send -X cursor-up
bind -T copy-mode-vi l send -X cursor-right
bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R

# --- SEARCH IN COPY MODE ---
bind -T copy-mode-vi / command-prompt -i -p "(search down)" "send -X search-forward-incremental \"%%%\""
bind -T copy-mode-vi ? command-prompt -i -p "(search up)" "send -X search-backward-incremental \"%%%\""

# --- SESSION MANAGEMENT ---
bind C-c new-session
bind C-f command-prompt -p find-session 'switch-client -t %%'

# --- CLEAR SCREEN AND HISTORY ---
bind C-k send-keys -R \; send-keys C-l \; clear-history

# --- PANE MANAGEMENT ---
bind x kill-pane
bind X kill-window
bind q confirm-before -p "kill-session #S? (y/n)" kill-session
bind Q confirm-before -p "kill-server? (y/n)" kill-server

# --- TOGGLE PANE ZOOM ---
bind z resize-pane -Z

# --- SYNCHRONIZE PANES ---
bind S setw synchronize-panes

# --- MOUSE (DISABLED FOR KEYBOARD-ONLY) ---
set -g mouse off

# --- NCURSES GREEN THEME ---
# Status bar
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-style fg=colour0,bg=colour2

# Status left
set -g status-left-length 20
set -g status-left "#[fg=colour0,bg=colour2,bold][#S] "

# Status right
set -g status-right-length 60
set -g status-right "#[fg=colour0,bg=colour2]%H:%M | %Y-%m-%d"

# Window status
setw -g window-status-format "#[fg=colour0,bg=colour2] #I:#W#F "
setw -g window-status-current-format "#[fg=colour2,bg=colour0,bold] #I:#W#F "
setw -g window-status-separator ""

# Pane borders (green active, black inactive)
set -g pane-border-style fg=colour0
set -g pane-active-border-style fg=colour2

# Message styling (green background, black text)
set -g message-style fg=colour0,bg=colour2,bold
set -g message-command-style fg=colour7,bg=colour0

# Copy mode styling (green background, black text)
set -g mode-style bg=colour2,fg=colour0

# Clock mode
setw -g clock-mode-style 24
setw -g clock-mode-colour colour2

# --- ACTIVITY MONITORING ---
setw -g monitor-activity on
set -g visual-activity off
set -g bell-action none
set -g visual-bell off

# --- PANE DISPLAY TIME ---
set -g display-panes-time 2000
set -g display-panes-colour colour2
set -g display-panes-active-colour colour0

# ============================================================================
# SWAY/FOOT/NVIM INTEGRATION NOTES
# ============================================================================
# - Prefix: Ctrl+a (no conflict with sway Mod4 or foot)
# - hjkl: Universal across tmux/nvim/vimb/vifm
# - Copy mode: Escape to enter, v select, y yank (matches nvim visual mode)
# - Pane nav: Ctrl+hjkl in copy mode allows seamless nvim-like movement
# - Colors: colour0=black, colour2=green (ncurses palette)
# ============================================================================
