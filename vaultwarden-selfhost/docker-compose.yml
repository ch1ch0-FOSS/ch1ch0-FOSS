version: '3.8'

services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    environment:
      - DOMAIN=http://localhost
      - ADMIN_TOKEN=changeme
      - INVITATIONS_ALLOWED=true
      - SHOW_PASSWORD_HINT=true
    volumes:
      - vaultwarden_data:/data
    ports:
      - "8000:80"
    restart: unless-stopped

volumes:
  vaultwarden_data:

